<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบที่ 2 v13.0 - กระดานกราฟชีวิต (หมอวิทยา ธรรมนาย)</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Kanit:wght@500;600;700&display=swap');

        body { font-family: 'Sarabun', sans-serif; background: #fdfdfd; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        
        h2 { color: #8e44ad; font-family: 'Kanit', sans-serif; margin-bottom: 5px; font-size: 2.2em; font-weight: 700;}
        .instruction { color: #7f8c8d; margin-bottom: 25px; font-size: 1.1em;}

        .input-section { margin-bottom: 30px; background: #f8f9fa; padding: 25px; border-radius: 15px; border: 2px dashed #bdc3c7; }
        textarea.main-input { width: 100%; height: 120px; padding: 15px; font-family: monospace; font-size: 16px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; resize: none; margin-bottom: 15px; background: #fff;}
        .btn-render { background: #2980b9; color: white; padding: 15px 40px; font-size: 1.3em; border: none; border-radius: 10px; cursor: pointer; font-family: 'Kanit', sans-serif; font-weight: 700; transition: 0.3s; width: 100%;}
        .btn-render:hover { background: #1f618d; transform: translateY(-2px); }

        .save-controls { display: flex; gap: 15px; justify-content: center; margin-top: 15px; display: none;}
        .btn-save { padding: 12px 30px; font-size: 1.1em; border: none; border-radius: 8px; cursor: pointer; font-family: 'Kanit', sans-serif; font-weight: 600; transition: 0.3s; color: white; flex: 1; max-width: 300px;}
        .btn-save-image { background: #27ae60; }
        .btn-save-image:hover { background: #2ecc71; transform: translateY(-1px); }
        .btn-save-pdf { background: #95a5a6; }
        .btn-save-pdf:hover { background: #7f8c8d; transform: translateY(-1px); }

        .export-container { 
            background: #293A4B; 
            padding: 30px 40px; 
            border-radius: 15px; 
            display: inline-block; 
            min-width: 1600px; 
            margin: 0 auto;
            position: relative;
        }

        .board-wrapper { overflow-x: auto; padding-bottom: 20px; margin-top: 30px; text-align: center;}
        
        .grid-board { 
            display: grid; 
            grid-template-columns: repeat(14, 1fr); 
            gap: 15px 30px; 
            width: 100%;
        }

        .card-item { 
            border-radius: 10px; 
            padding: 3px; 
            border: 1px solid rgba(255,255,255,0.2); 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .card-item img { width: 100%; height: auto; border-radius: 6px; display: block; background: #fff;}
        
        .pos-label { 
            display: block; font-weight: bold; 
            font-size: 1.15em; margin-bottom: 6px; 
            border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 2px; 
            font-family: 'TH SarabunPSK', 'Sarabun', sans-serif;
            line-height: 1.2;
            text-shadow: none !important;        
            -webkit-text-stroke: 0px !important; 
        }

        .card-default .pos-label, .card-good .pos-label, .card-neutral-status .pos-label { color: #2c3e50 !important; border-bottom-color: rgba(0,0,0,0.15) !important; }
        .card-default .pos-label.label-danger, .card-good .pos-label.label-danger, .card-neutral-status .pos-label.label-danger { color: #d32f2f !important; }
        .card-very-good .pos-label, .card-bad .pos-label, .card-very-bad .pos-label, .card-dark-gray .pos-label, .card-black .pos-label, .card-red .pos-label, .card-gold-zone .pos-label { color: #ffffff !important; border-bottom-color: rgba(255,255,255,0.3) !important; }

        .card-default { background-color: #f2f4f4 !important; border-color: #d5d8dc !important; }
        .card-very-good { background-color: #0047AB !important; border-color: #003380 !important; }
        .card-good { background-color: #bbdefb !important; border-color: #90caf9 !important; }
        .card-neutral-status { background-color: #ffffff !important; border-color: #cccccc !important; }
        .card-bad { background-color: #212121 !important; border-color: #000000 !important; }
        .card-very-bad { background-color: #b71c1c !important; border-color: #7f0000 !important; }
        .card-dark-gray { background-color: #424949 !important; border-color: #273746 !important; }
        .card-black { background-color: #17202a !important; border-color: #000000 !important; }
        .card-red { background-color: #cb4335 !important; border-color: #922b21 !important; }
        .card-gold-zone { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c) !important; border-color: #aa771c !important; box-shadow: 0 4px 15px rgba(170, 119, 28, 0.5); }

        .teacher-watermark { font-size: 1.15em; color: #f1c40f; font-family: 'Sarabun', sans-serif; font-weight: bold; text-align: right; align-self: start; padding-right: 5px; margin-top: -5px; letter-spacing: 0.5px; }

        /* ---------------------------------------------------
           กล่องข้อมูลเจ้าชะตา (อัปเดต v13.0 ชิดซ้าย ฟอนต์ใหญ่ขึ้น)
        --------------------------------------------------- */
        .client-info-container { display: flex; align-items: stretch; width: 100%; }
        .client-info-box {
            width: 100%;
            background-color: #f2f4f4; 
            border: 2px dashed #95a5a6; 
            border-radius: 10px;
            padding: 10px 15px;
            color: #17202a;
            font-family: 'TH SarabunPSK', 'Sarabun', sans-serif; 
            font-size: 1.45em; /* ขยายขนาดใหญ่ขึ้น */
            font-weight: bold;
            line-height: 1.5;
            resize: none;
            outline: none;
            box-sizing: border-box;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            text-align: left; /* จัดข้อความชิดซ้าย */
        }

        /* ---------------------------------------------------
           Dropdown & กล่อง Custom
        --------------------------------------------------- */
        .dropdown-cell {
            background-color: #293A4B; border-radius: 8px; margin-top: 5px; margin-bottom: 5px; 
            display: flex; align-items: center; justify-content: center;
            border: 2px solid transparent; height: 45px; box-sizing: border-box;
        }
        .number-dropdown {
            background: transparent; color: #293A4B; font-weight: 700; font-size: 1.6em;
            border: none; outline: none; cursor: pointer; font-family: 'Kanit', sans-serif;
            width: 100%; text-align: center; text-align-last: center; 
            -webkit-appearance: none; -moz-appearance: none; appearance: none;         
            line-height: 41px; display: block; margin: 0; padding: 0;
        }
        .number-dropdown option { color: #000; background: #fff; font-size: 18px; }

        .custom-cell {
            background-color: #293A4B; border-radius: 8px; margin-top: 5px; margin-bottom: 5px; 
            display: flex; align-items: center; justify-content: center; border: 2px solid transparent; 
            height: 45px; box-sizing: border-box; position: relative; transition: 0.3s;
        }
        .custom-cell.active { background-color: #ecf0f1; border: 2px solid rgba(0,0,0,0.2); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .manual-input { background: transparent; color: #293A4B; font-weight: 700; font-size: 1.6em; border: none; outline: none; font-family: 'Kanit', sans-serif; width: 100%; text-align: center; padding: 0; margin: 0; }
        .manual-input::placeholder { color: #293A4B; }
        .custom-cell.active .manual-input { color: #000; }
        .custom-cell.active .manual-input::placeholder { color: rgba(0,0,0,0.3); }
        .color-picker { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; padding: 0; border: 2px solid rgba(255,255,255,0.4); border-radius: 50%; cursor: pointer; background: transparent; outline: none; opacity: 0.3; transition: 0.3s; }
        .color-picker:hover { opacity: 1; }
        .color-picker::-webkit-color-swatch-wrapper { padding: 0; }
        .color-picker::-webkit-color-swatch { border: none; border-radius: 50%; }

    </style>
</head>
<body>

<div class="container">
    <h2>🔮 กระดานแสดงภาพไพ่กราฟชีวิต (หมอวิทยา ธรรมนาย)</h2>
    <p class="instruction">วางรหัสข้อมูลทั้ง 6 ชุด แล้วกดปุ่ม "SHOW CARD"</p>

    <div class="input-section">
        <textarea id="data-input" class="main-input" placeholder="วางข้อมูล DATE:...\nDAY:...\n... ไว้ที่นี่"></textarea>
        <button class="btn-render" onclick="renderBoard()">🖼️ SHOW CARD</button>
        
        <div id="save-area" class="save-controls">
            <button class="btn-save btn-save-image" onclick="saveAsImage()">💾 SAVE IMAGE</button>
            <button class="btn-save btn-save-pdf" onclick="saveAsPdf()">📑 SAVE PDF</button>
        </div>
    </div>

    <div class="board-wrapper" style="display: none;" id="main-wrapper">
        <div id="export-area" class="export-container">
            <div class="grid-board" id="main-board"></div>
        </div>
    </div>
</div>

<script>
    const ROW_2_TITLES = ["วาสนา", "ความเสื่อม", "ทรัพย์สิน", "บิดา", "มารดา", "บ้านช่อง", "สายกลาง"];
    const ROW_8_TITLES = ["พื้นดวง", "ทรัพย์สิน", "บ้านช่อง", "ญาติพี่น้อง", "บริวาร", "ศัตรู", "คู่ครอง", "โรคภัย", "ความสุข", "การงาน", "โชคลาภ", "สรุปชะตา"];
    const ROW_4_TITLES = ["ตัวเรา", "การเงิน", "เพื่อน", "ญาติพี่น้อง", "บริวาร", "ศัตรู", "คู่ครอง"];
    const ROW_6_TITLES = ["สูญเสีย", "ความสุข", "การงาน", "โชคลาภ", "โรคภัย", "รับใช้ ช.", "รับใช้ ญ."];

    const TEACHER_CARDS = ["501", "502", "503", "504", "505", "506"];
    const DANGER_TITLES = ["ความเสื่อม", "ศัตรู", "สูญเสีย", "โรคภัย"];
    const WEALTH_POSITIONS = ["พื้นดวง", "ทรัพย์สิน", "ความสุข", "โชคลาภ"];
    const WEALTH_CARDS = ["410", "411", "415", "416", "424", "429"];

    const VERY_GOOD = ["409", "411", "424"];
    const GOOD = ["402", "404", "405", "406", "410", "414", "415", "416", "417", "418", "419", "421", "422", "426", "429"];
    const NEUTRAL = ["403", "407", "420", "435", "436"];
    const BAD = ["413", "423", "425", "427", "428", "430", "432", "433", "434"];
    const VERY_BAD = ["401", "408", "412", "431"];

    const NUMBER_COLORS = {
        "1": { bg: "#ffcccc", color: "#990000" }, 
        "2": { bg: "#fff5cc", color: "#997a00" }, 
        "3": { bg: "#ffccf2", color: "#990073" }, 
        "4": { bg: "#ccffcc", color: "#006600" }, 
        "5": { bg: "#ffe0cc", color: "#994700" }, 
        "6": { bg: "#cce0ff", color: "#003d99" }, 
        "7": { bg: "#e6ccff", color: "#4b0099" }, 
        "8": { bg: "#e6d9cc", color: "#664d00" }, 
        "9": { bg: "#ccffee", color: "#006644" }, 
        "10": { bg: "#ffcce6", color: "#99004d" },
        "11": { bg: "#eeffcc", color: "#4d6600" },
        "12": { bg: "#ccffff", color: "#006666" } 
    };

    function updateDropdown(selectEl) {
        Array.from(selectEl.options).forEach(opt => opt.removeAttribute('selected'));
        selectEl.options[selectEl.selectedIndex].setAttribute('selected', 'selected');
        const val = selectEl.value;
        const parentCell = selectEl.parentElement;
        if (val && NUMBER_COLORS[val]) {
            parentCell.style.backgroundColor = NUMBER_COLORS[val].bg;
            parentCell.style.borderColor = "rgba(0,0,0,0.2)";
            parentCell.style.boxShadow = "0 4px 10px rgba(0,0,0,0.3)";
            selectEl.style.color = NUMBER_COLORS[val].color;
        } else {
            parentCell.style.backgroundColor = "#293A4B"; 
            parentCell.style.borderColor = "transparent";
            parentCell.style.boxShadow = "none";
            selectEl.style.color = "#293A4B"; 
        }
    }

    function updateCustomInput(inputEl) {
        const parent = inputEl.parentElement;
        if (inputEl.value.trim() !== "") { parent.classList.add('active'); } 
        else { if (!parent.dataset.customColor) { parent.classList.remove('active'); } }
    }

    function updateCustomColor(pickerEl) {
        const parent = pickerEl.parentElement;
        parent.classList.add('active');
        parent.style.backgroundColor = pickerEl.value;
        parent.dataset.customColor = "true"; 
    }

    function renderBoard() {
        const inputText = document.getElementById('data-input').value.trim();
        if(!inputText) { alert("กรุณาวางข้อมูลก่อนครับ"); return; }

        const data = parseInput(inputText);
        if(!data.DATE || !data.SEVEN_BASE) { alert("รูปแบบข้อมูลไม่ถูกต้องครับ"); return; }

        const posRow10 = calculateDynamicPositions(data.YEAR, "301"); 
        const board = document.getElementById('main-board');
        board.innerHTML = '';

        const addCard = (code, gridRow, gridCol, title) => {
            if (!code) return;
            let cardClass = "card-item";
            let titleHtml = "";

            if (gridRow === 5) {
                if (WEALTH_POSITIONS.includes(title) && WEALTH_CARDS.includes(code)) { cardClass += " card-gold-zone"; } 
                else if (title === "ศัตรู" || title === "โรคภัย") {
                    if (VERY_GOOD.includes(code) || GOOD.includes(code)) cardClass += " card-dark-gray";
                    else if (NEUTRAL.includes(code)) cardClass += " card-black";
                    else if (BAD.includes(code) || VERY_BAD.includes(code)) cardClass += " card-red";
                    else cardClass += " card-neutral-status";
                }
                else {
                    if (VERY_GOOD.includes(code)) cardClass += " card-very-good";
                    else if (GOOD.includes(code)) cardClass += " card-good";
                    else if (NEUTRAL.includes(code)) cardClass += " card-neutral-status";
                    else if (BAD.includes(code)) cardClass += " card-bad";
                    else if (VERY_BAD.includes(code)) cardClass += " card-very-bad";
                    else cardClass += " card-neutral-status"; 
                }
            } else { cardClass += " card-default"; }

            if (title) {
                let titleClass = DANGER_TITLES.includes(title) ? "pos-label label-danger" : "pos-label";
                titleHtml = `<span class="${titleClass}">${title}</span>`;
            }

            const html = `
                <div class="${cardClass}" style="grid-area: ${gridRow} / ${gridCol} / span 1 / span 1;">
                    ${titleHtml}
                    <img src="images/${code}.jpg" onerror="this.src='images/back.jpg';">
                </div>
            `;
            board.innerHTML += html;
        }

        // --- แถว 1: DATE, กล่องข้อมูล, ไพ่ครูจัดกลุ่ม (Flexbox) ---
        addCard(data.DATE[0], 1, 2, null); 
        
        // กล่องข้อมูลเจ้าชะตา พร้อมข้อความตั้งต้น
        board.innerHTML += `
            <div class="client-info-container" style="grid-area: 1 / 3 / span 1 / span 6;">
                <textarea class="client-info-box">เจ้าชะตา : \nวันเดือนปีเกิด : \nข้อมูลประกอบ : </textarea>
            </div>
        `;

        // สร้างกล่อง Flexbox สำหรับไพ่ครูโดยเฉพาะ เพื่อให้ไพ่แนบชิดกัน (gap: 10px)
        let teacherCardsHtml = `<div style="grid-area: 1 / 9 / span 1 / span 6; display: flex; gap: 10px; justify-content: space-between;">`;
        TEACHER_CARDS.forEach(c => {
            teacherCardsHtml += `
                <div class="card-item card-default" style="flex: 1;">
                    <img src="images/${c}.jpg" onerror="this.src='images/back.jpg';">
                </div>`;
        });
        teacherCardsHtml += `</div>`;
        board.innerHTML += teacherCardsHtml;

        board.innerHTML += `<div class="teacher-watermark" style="grid-area: 2 / 9 / span 1 / span 6;">พรหมญาณพยากรณ์ โดย หมอวิทยา ธรรมนาย</div>`;

        // --- แถว 2-5: ไพ่หลัก ---
        if(data.DAY) data.DAY.forEach((c, i) => addCard(c, 2, i + 2, ROW_2_TITLES[i]));
        if(data.MONTH) data.MONTH.forEach((c, i) => {
            let idx = calculateDynamicPositions(data.MONTH, "201").indexOf(i);
            addCard(c, 3, i + 2, idx !== -1 ? ROW_4_TITLES[idx] : null);
        });
        if(data.YEAR) data.YEAR.forEach((c, i) => {
            let idx = calculateDynamicPositions(data.YEAR, "301").indexOf(i);
            addCard(c, 4, i + 2, idx !== -1 ? ROW_6_TITLES[idx] : null);
        });
        if(data.GRAPH_BASE) data.GRAPH_BASE.forEach((c, i) => addCard(c, 5, i + 2, ROW_8_TITLES[i]));

        // แถว 6: Dropdown
        for(let col = 2; col <= 13; col++) {
            let optionsHtml = '<option value="" selected>-</option>';
            for(let n=1; n<=12; n++) { optionsHtml += `<option value="${n}">${n}</option>`; }
            board.innerHTML += `
                <div class="dropdown-cell" style="grid-area: 6 / ${col} / span 1 / span 1;">
                    <select class="number-dropdown" onchange="updateDropdown(this)">${optionsHtml}</select>
                </div>`;
        }

        // แถว 7: ไพ่ SEVEN_BASE
        if(data.SEVEN_BASE) data.SEVEN_BASE.forEach((c, i) => addCard(c, 7, posRow10[i] + 2, null));

        // แถว 8: กล่อง Custom
        for(let col = 2; col <= 13; col++) {
            board.innerHTML += `
                <div class="custom-cell" style="grid-area: 8 / ${col} / span 1 / span 1;">
                    <input type="text" class="manual-input" placeholder="-" oninput="updateCustomInput(this)" maxlength="5">
                    <input type="color" class="color-picker" value="#ecf0f1" title="เปลี่ยนสีพื้นหลัง" onchange="updateCustomColor(this)">
                </div>`;
        }

        document.getElementById('main-wrapper').style.display = 'block';
        document.getElementById('save-area').style.display = 'flex'; 
    }

    function parseInput(text) {
        let result = {};
        text.split('\n').forEach(line => {
            if(line.includes(':')) {
                const parts = line.split(':');
                result[parts[0].trim()] = parts[1].trim().split(',');
            }
        });
        return result;
    }

    function calculateDynamicPositions(arrayData, targetCode) {
        if(!arrayData) return [];
        let splitIndex = arrayData.indexOf(targetCode);
        if(splitIndex === -1) splitIndex = 0; 
        let positions = [];
        if (splitIndex === 0 || splitIndex >= 7) { for(let i=0; i<7; i++) positions.push(i); } 
        else {
            for(let i=0; i<splitIndex; i++) positions.push(i);
            let remaining = 7 - splitIndex;
            let startRight = 12 - remaining;
            for(let i=0; i<remaining; i++) positions.push(startRight + i);
        }
        return positions;
    }

    function replaceSelectsForCapture() {
        // จัดการ Dropdown
        document.querySelectorAll('.number-dropdown').forEach(sel => {
            const val = sel.value;
            const span = document.createElement('span');
            span.className = 'print-temp-span';
            span.style.fontWeight = '700'; span.style.fontSize = '1.6em'; span.style.fontFamily = "'Kanit', sans-serif";
            span.style.color = sel.style.color; 
            span.innerText = val === "" ? "-" : val; 
            sel.style.display = 'none'; 
            sel.parentNode.appendChild(span); 
        });

        // จัดการ Custom Input
        document.querySelectorAll('.manual-input').forEach(inp => {
            const parent = inp.parentElement;
            if(parent.classList.contains('active')) {
                const val = inp.value.trim() === "" ? "-" : inp.value.trim();
                const span = document.createElement('span');
                span.className = 'print-temp-span';
                span.style.fontWeight = '700'; span.style.fontSize = '1.6em'; span.style.fontFamily = "'Kanit', sans-serif";
                span.style.color = '#000'; 
                span.innerText = val;
                inp.style.display = 'none';
                parent.appendChild(span);
            } else {
                inp.style.display = 'none'; 
            }
        });

        // จัดการกล่องข้อมูลเจ้าชะตา (Textarea) ให้เซฟภาพออกมาจัดชิดซ้ายเป๊ะ
        document.querySelectorAll('.client-info-box').forEach(txt => {
            const val = txt.value;
            const div = document.createElement('div');
            div.className = 'print-temp-span'; 
            div.style.backgroundColor = '#f2f4f4';
            div.style.border = '2px dashed #95a5a6'; 
            div.style.borderRadius = '10px';
            div.style.padding = '10px 15px';
            div.style.color = '#17202a';
            div.style.fontFamily = "'TH SarabunPSK', 'Sarabun', sans-serif";
            div.style.fontSize = '1.45em';
            div.style.fontWeight = 'bold';
            div.style.lineHeight = '1.5';
            div.style.whiteSpace = 'pre-wrap';
            div.style.width = '100%';
            div.style.height = '100%';
            div.style.boxSizing = 'border-box';
            div.style.textAlign = 'left'; // สั่งจัดซ้ายตอนเซฟรูปภาพ
            div.innerText = val || " "; 
            txt.style.display = 'none';
            txt.parentNode.appendChild(div);
        });

        document.querySelectorAll('.color-picker').forEach(p => p.style.display = 'none');
    }

    function restoreSelectsAfterCapture() {
        document.querySelectorAll('.print-temp-span').forEach(span => span.remove());
        document.querySelectorAll('.number-dropdown').forEach(sel => sel.style.display = 'block');
        document.querySelectorAll('.manual-input').forEach(inp => inp.style.display = 'block');
        document.querySelectorAll('.client-info-box').forEach(txt => txt.style.display = 'block');
        document.querySelectorAll('.color-picker').forEach(p => p.style.display = 'block');
    }

    function saveAsImage() {
        replaceSelectsForCapture();
        const target = document.getElementById('export-area');
        window.scrollTo(0,0);
        html2canvas(target, { scale: 2, useCORS: true, backgroundColor: "#293A4B" }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'กราฟชีวิต-หมอวิทยา.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            restoreSelectsAfterCapture();
        });
    }

    function saveAsPdf() {
        replaceSelectsForCapture();
        const target = document.getElementById('export-area');
        const opt = {
            margin: 0.2, filename: 'กราฟชีวิต-หมอวิทยา.pdf', image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, backgroundColor: "#293A4B" },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(target).save().then(() => {
            restoreSelectsAfterCapture();
        });
    }
</script>
</body>
</html>
